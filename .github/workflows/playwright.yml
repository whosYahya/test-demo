name: ERPNext Playwright

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_mutation_suite:
        description: 'Run the full mutation suite against NONPROD_BASE_URL'
        required: true
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Gate
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.SMOKE_BASE_URL != '' && secrets.SMOKE_BASE_URL || secrets.BASE_URL }}
      ERPNEXT_USER: ${{ secrets.SMOKE_ERPNEXT_USER != '' && secrets.SMOKE_ERPNEXT_USER || secrets.ERPNEXT_USER }}
      ERPNEXT_PASS: ${{ secrets.SMOKE_ERPNEXT_PASS != '' && secrets.SMOKE_ERPNEXT_PASS || secrets.ERPNEXT_PASS }}
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Smoke Suite
        if: ${{ env.BASE_URL != '' && env.ERPNEXT_USER != '' && env.ERPNEXT_PASS != '' }}
        run: npm run test:smoke -- --reporter=list,junit

      - name: Upload smoke results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results
          path: test-results/
          retention-days: 7

  mutation:
    name: Full Mutation Suite
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_mutation_suite }}
    env:
      BASE_URL: ${{ secrets.NONPROD_BASE_URL }}
      ERPNEXT_USER: ${{ secrets.NONPROD_ERPNEXT_USER }}
      ERPNEXT_PASS: ${{ secrets.NONPROD_ERPNEXT_PASS }}
      ALLOW_MUTATION_TESTS: 'true'
      CI: true
      XMOD_USER_A_EMAIL: ${{ secrets.XMOD_USER_A_EMAIL }}
      XMOD_USER_A_PASSWORD: ${{ secrets.XMOD_USER_A_PASSWORD }}
      XMOD_USER_A_EMPLOYEE: ${{ secrets.XMOD_USER_A_EMPLOYEE }}
      XMOD_USER_B_EMAIL: ${{ secrets.XMOD_USER_B_EMAIL }}
      XMOD_USER_B_PASSWORD: ${{ secrets.XMOD_USER_B_PASSWORD }}
      XMOD_USER_B_EMPLOYEE: ${{ secrets.XMOD_USER_B_EMPLOYEE }}
      XMOD_ADMIN_USER: ${{ secrets.XMOD_ADMIN_USER }}
      XMOD_ADMIN_PASS: ${{ secrets.XMOD_ADMIN_PASS }}
      XMOD_LEAVE_TYPE: ${{ secrets.XMOD_LEAVE_TYPE }}
      XMOD_EXPENSE_TYPE: ${{ secrets.XMOD_EXPENSE_TYPE }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install openpyxl

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Full Mutation Suite
        run: npm run test:mutation -- --reporter=list,junit,html,json
        continue-on-error: true

      - name: Run Data-Driven Suite
        run: npm run test:data-driven -- --reporter=list,junit
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.NONPROD_BASE_URL }}
          ERPNEXT_USER: ${{ secrets.NONPROD_ERPNEXT_USER }}
          ERPNEXT_PASS: ${{ secrets.NONPROD_ERPNEXT_PASS }}
          ALLOW_MUTATION_TESTS: 'true'
          CI: true

      - name: Update AMC Master Tracker
        run: |
          python update_tracker.py \
            --results test-results/results.json \
            --excel AMC_Master_Tracker.xlsx
        continue-on-error: true

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Playwright Mutation Results
          path: test-results/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload updated QA Tracker
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AMC-Master-Tracker-Updated
          path: AMC_Master_Tracker.xlsx
          retention-days: 30

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: reports/html/
          retention-days: 30

      - name: Upload test evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-evidence
          path: test-results/
          retention-days: 14

      - name: Upload data-driven results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: data-driven-results
          path: test-results/
          retention-days: 14
